<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <meta name="color-scheme" content="light dark" />
    <meta name="description" content="RDL Warmup - Telegram Mini App for BP Debate Games" />
    <title>RDL Warmup</title>
    <link rel="icon" type="image/png" href="/raccoon-favicon.png" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        background-color: var(--tg-theme-bg-color, #ffffff);
        color: var(--tg-theme-text-color, #000000);
        min-height: 100vh;
        overflow-x: hidden;
      }
      
      #root {
        min-height: 100vh;
      }
      
      /* Prevent text selection */
      * {
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      
      input, textarea {
        -webkit-user-select: text;
        user-select: text;
      }

      /* Loading indicator */
      #initial-loading {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        background: var(--tg-theme-bg-color, #ffffff);
        z-index: 9999;
      }

      #initial-loading.hidden {
        display: none;
      }

      .loading-spinner {
        padding: 20px;
        text-align: center;
      }

      /* Error display */
      #error-display {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: none;
        padding: 20px;
        background: var(--tg-theme-bg-color, #ffffff);
        color: #e74c3c;
        z-index: 10000;
        overflow: auto;
        white-space: pre-wrap;
        font-family: monospace;
        font-size: 12px;
      }

      #error-display.visible {
        display: block;
      }

      /* No script message */
      noscript {
        display: block;
        padding: 20px;
        text-align: center;
        color: #e74c3c;
      }
    </style>
  </head>
  <body>
    <noscript>
      <h1>JavaScript Required</h1>
      <p>This application requires JavaScript to run. Please enable JavaScript in your browser.</p>
    </noscript>
    
    <div id="initial-loading">
      <div class="loading-spinner">
        <div>Загрузка...</div>
        <div style="font-size: 12px; color: #666; margin-top: 10px;">RDL Warmup</div>
      </div>
    </div>
    
    <div id="root"></div>
    
    <div id="error-display"></div>
    
    <script>
      // Capture errors and show them
      window.onerror = function(msg, url, line, col, error) {
        // Ignore benign ResizeObserver loop error from Radix UI
        if (typeof msg === 'string' && msg.includes('ResizeObserver loop')) {
          return false;
        }
        console.error('[PAGE ERROR]', msg, 'at', url, line, col, error);
        var errorDiv = document.getElementById('error-display');
        var loader = document.getElementById('initial-loading');
        if (errorDiv) {
          errorDiv.textContent += 'ERROR: ' + msg + '\n at ' + url + ':' + line + '\n\n';
          errorDiv.classList.add('visible');
        }
        if (loader) {
          loader.classList.add('hidden');
        }
        return false;
      };
      
      window.addEventListener('error', function(event) {
        // Ignore benign ResizeObserver loop error from Radix UI
        if (event.message && event.message.includes('ResizeObserver loop')) {
          event.preventDefault();
          return;
        }
        console.error('[ERROR EVENT]', event.error);
      });
      
      window.addEventListener('unhandledrejection', function(event) {
        console.error('[UNHANDLED REJECTION]', event.reason);
        var errorDiv = document.getElementById('error-display');
        if (errorDiv) {
          errorDiv.textContent += 'PROMISE REJECTION: ' + (event.reason && event.reason.message || event.reason) + '\n\n';
          errorDiv.classList.add('visible');
        }
      });
      
      // Timeout to detect if app doesn't load
      setTimeout(function() {
        var root = document.getElementById('root');
        var loader = document.getElementById('initial-loading');
        if (loader && !loader.classList.contains('hidden') && root && root.children.length === 0) {
          console.error('[TIMEOUT] App failed to load within 10 seconds');
          var errorDiv = document.getElementById('error-display');
          if (errorDiv) {
            errorDiv.textContent = 'ERROR: App failed to load within 10 seconds.\nCheck console for details.';
            errorDiv.classList.add('visible');
          }
          loader.classList.add('hidden');
        }
      }, 10000);
    </script>
    
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Fallback if module script fails to load
      window.addEventListener('DOMContentLoaded', function() {
        setTimeout(function() {
          if (!window.__APP_LOADED__) {
            console.error('[FALLBACK] App script did not load correctly');
            var errorDiv = document.getElementById('error-display');
            var loader = document.getElementById('initial-loading');
            if (errorDiv) {
              errorDiv.textContent = 'ERROR: Failed to load app script.\nMake sure you are running this through a web server, not opening the file directly.\n\nTry: npm run webapp:dev';
              errorDiv.classList.add('visible');
            }
            if (loader) {
              loader.classList.add('hidden');
            }
          }
        }, 5000);
      });
    </script>
  </body>
</html>
