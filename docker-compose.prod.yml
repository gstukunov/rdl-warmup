version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: telegram_bot_postgres_prod
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - telegram_network
    restart: always
    ports:
      - '127.0.0.1:5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: telegram_bot_redis_prod
    volumes:
      - redis_data_prod:/data
    networks:
      - telegram_network
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ['CMD', 'redis-cli', '--pass', '${REDIS_PASSWORD}', 'ping']
      interval: 30s
      timeout: 10s
      retries: 5

  migrations:
    image: ${IMAGE_NAME}:latest
    container_name: telegram_bot_migrations_prod
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
    command: npm run migration:run:prod
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - telegram_network
    restart: 'no'

  app:
    image: ${IMAGE_NAME}:latest
    container_name: telegram_bot_app_prod
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      # Telegram Configuration
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
      TELEGRAM_WEBAPP_URL: ${TELEGRAM_WEBAPP_URL}
      # Redis Configuration
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # Game Configuration
      GAME_PASSWORD: ${GAME_PASSWORD}
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - telegram_network
    restart: always
    labels:
      - 'com.centurylinklabs.watchtower.enable=true'
    # Serve static files from public/webapp (already included in image)
    volumes:
      - app_logs:/usr/src/app/logs

  # Optional: Nginx reverse proxy for SSL termination and static file serving
  # Uncomment if you want to use Nginx in front of the app
  nginx:
    image: nginx:alpine
    container_name: bot_nginx
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro # SSL сертификаты
      - /var/www/certbot:/var/www/certbot:ro # Для обновления сертификатов
    depends_on:
      - app
    networks:
      - telegram_network
    restart: always

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.docker/config.json:/config.json
    environment:
      WATCHTOWER_CLEANUP: true
      WATCHTOWER_POLL_INTERVAL: 60
      WATCHTOWER_INCLUDE_RESTARTING: true
      WATCHTOWER_ROLLING_RESTART: false
      WATCHTOWER_LABEL_ENABLE: true
      TZ: Europe/Moscow
    networks:
      - telegram_network
    restart: always

volumes:
  postgres_data_prod:
  redis_data_prod:
  app_logs:

networks:
  telegram_network:
    driver: bridge
