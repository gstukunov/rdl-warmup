version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: telegram_bot_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-telegram_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-telegram_password}
      POSTGRES_DB: ${DB_NAME:-telegram_bot_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - telegram_network
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${DB_USER:-telegram_user} -d ${DB_NAME:-telegram_bot_db}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for session management and caching
  redis:
    image: redis:7-alpine
    container_name: telegram_bot_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - telegram_network
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # Migration Service - runs migrations before app starts
  migrations:
    build:
      context: .
      dockerfile: Dockerfile.migrations
    container_name: telegram_bot_migrations
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-telegram_user}
      DB_PASSWORD: ${DB_PASSWORD:-telegram_password}
      DB_NAME: ${DB_NAME:-telegram_bot_db}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - telegram_network
    restart: 'no'
    profiles:
      - migrations

  # NestJS Application
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: telegram_bot_app
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-telegram_user}
      DB_PASSWORD: ${DB_PASSWORD:-telegram_password}
      DB_NAME: ${DB_NAME:-telegram_bot_db}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBAPP_URL: ${TELEGRAM_WEBAPP_URL:-http://localhost:3000}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - '3000:3000'
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - telegram_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  telegram_network:
    driver: bridge
